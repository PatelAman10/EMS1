 <div class="employees-page" [ngClass]="currentTheme">

  <!-- Header bar -->
  <div class="header-bar">
    <h2>Edit Employee</h2>
    <div class="header-controls">
      <button class="btn danger" (click)="goBack()">Back</button>
      <select [(ngModel)]="currentTheme" class="theme-selector">
        <option value="light">Light</option>
        <option value="dark">Dark</option>
        <option value="colorful">Colorful</option>
      </select>
    </div>
  </div>

  <!-- Employee card -->
  <div class="table-card">
    <p>Editing employee ID: {{ employeeId }}</p>

    <form [formGroup]="employeeForm" (ngSubmit)="update()">

      <div class="form-group">
        <label>Name:</label>
        <input formControlName="name" />
        <div *ngIf="employeeForm.get('name')?.touched && employeeForm.get('name')?.invalid" class="error">
          Name is required
        </div>
      </div>

      <div class="form-group">
        <label>Role:</label>
        <input formControlName="role" />
        <div *ngIf="employeeForm.get('role')?.touched && employeeForm.get('role')?.invalid" class="error">
          Role is required
        </div>
      </div>

      <div class="form-group">
        <label>Email:</label>
        <input type="email" formControlName="email" />
        <div *ngIf="employeeForm.get('email')?.touched && employeeForm.get('email')?.invalid" class="error">
          Email is required
        </div>
      </div>

      <div class="form-group">
        <label>Salary:</label>
        <input type="number" formControlName="salary" />
        <div *ngIf="employeeForm.get('salary')?.touched && employeeForm.get('salary')?.invalid" class="error">
          Salary is required
        </div>
      </div>

      <button type="submit" class="btn primary">Update</button>
    </form>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <small><i><!-- © 2026 Your Company Name Here --></i></small>
  </footer>

</div>
